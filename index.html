<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ట్రూ మెసెంజర్</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }

        .logo-container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* మీరు ఇచ్చిన ఒరిజినల్ గోల్డెన్ ఇమేజ్ */
        .main-logo {
            width: 100%;
            height: auto;
            display: block;
            /* నానో బనానా లెవల్ ఫినిషింగ్ కోసం చిన్న షాడో */
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
        }

        /* అక్షరాలకు ఆనుకొని ఉండేలా లైన్ సెట్టింగ్ */
        .thick-line {
            height: 6px;
            width: 100%;
            margin-top: -8px; /* అక్షరాలకు పక్కాగా ఆనుకోవడానికి */
            background-color: rgba(255, 0, 0, 0.6); /* ట్రాన్స్‌పరెంట్ రెడ్ */
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="Gemini_Generated_Image_8wjqp48wjqp48wjq%281%29.jpg" class="main-logo" alt="True Messenger Logo">
        
        <div class="thick-line"></div>
    </div>

</body>
</html>
