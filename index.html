<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ట్రూ మెసెంజర్</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }
        .container {
            text-align: center;
            width: 90%;

            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="1772973315894%281%29.png" class="logo" alt="True Messenger">
        <div class="rainbow-line"></div>
