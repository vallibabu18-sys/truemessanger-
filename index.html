<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ట్రూ మెసెంజర్</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* మొత్తం లోగో సెటప్ ఒకే లైన్ లో ఆనుకొని రావడానికి */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* 1. ఎడమ వైపు థిక్ గోల్డెన్ పక్షి */
        .left-bird {
            font-size: 65px;
            color: #FFD700;
            text-shadow: 0px 0px 15px rgba(255, 215, 0, 0.7);
            display: inline-block;
            line-height: 1;
        }

        /* 2. అక్షరాలు + అండర్ లైన్ బాక్స్ */
        .text-box {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* థిక్ గోల్డెన్ తెలుగు లెటర్స్ */
        .gold-letters {
            font-size: 52px;
            font-weight: 900; /* చాలా థిక్ అక్షరాలు */
            color: #D4AF37;
            background: linear-gradient(to bottom, #FFF7C2 0%, #FFD700 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.0; /* అక్షరాలకి లైన్ కి అస్సలు గ్యాప్ లేకుండా ఆనుకొని ఉండటానికి */
            padding: 0;
            margin: 0;
        }

        /* 3. అక్షరాలకు ఆనుకొని పక్కా ఖచ్చితత్వంతో వచ్చే థిక్ రెడ్ ట్రాన్స్‌పరెంట్ అండర్ లైన్ */
        .red-line {
            height: 8px; /* థిక్ లైన్ */
            width: 100%;
            margin-top: 1px; /* కచ్చితంగా అక్షరాల కిందే అంటుకొని వస్తుంది */
            background-color: rgba(255, 0, 0, 0.45); /* థిక్ రెడ్ + ట్రాన్స్‌పరెంట్ */
            border-radius: 2px;
            box-shadow: 0px 1px 3px rgba(255, 0, 0, 0.15);
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- ఎడమ వైపు గోల్డ్ పక్షి -->
        <div class="left-bird">🕊️</div>

        <!-- అక్షరాలకు ఆనుకొని ఉండే అండర్ లైన్ సెటప్ -->
        <div class="text-box">
            <h1 class="gold-letters">ట్రూ మెసెంజర్</h1>
            <div class="red-line"></div>
        </div>
    </div>

    <script>
        // బ్రౌజర్ పాత మెమరీని క్లియర్ చేయడానికి చిన్న ట్రిక్
        console.log("Version: " + Math.random());
    </script>
</body>
</html>
