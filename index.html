<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ట్రూ మెసెంజర్</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* లోగో బాక్స్ */
        .logo-container {
            text-align: center;
            width: 90%;
            max-width: 320px;
        }

        /* మీ ఒరిజినల్ లోగో ఇమేజ్ */
        .main-logo {
            width: 100%;
            height: auto;
            display: block;
        }

        /* లోగో కింద చిన్న మెరుపు లైన్ */
        .line {
            height: 4px;
            width: 100%;
            margin-top: 15px;
            background: linear-gradient(90deg, red, yellow, green, blue);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="1772973315894(1).png" class="main-logo" alt="True Messenger">
        <div class="line"></div>
    </div>

</body>
</html>
