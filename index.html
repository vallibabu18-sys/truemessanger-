<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ట్రూ మెసెంజర్ - ఫైనల్</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 450px;
            text-align: center;
        }

        /* మీరు పంపిన అసలైన ఫోటో - ఏ గందరగోళం లేకుండా డైరెక్ట్ లింక్ */
        .final-logo {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        /* అక్షరాలకు ఆనుకొని పక్కాగా ఉండే థిక్ రెడ్ అండర్ లైన్ */
        .red-line-fixed {
            height: 8px;
            width: 100%;
            margin-top: -12px; /* ఇమేజ్ లోని అక్షరాలకు సరిగ్గా ఆనుకోవడానికి */
            background-color: rgba(255, 0, 0, 0.5); /* థిక్ ట్రాన్స్‌పరెంట్ రెడ్ */
            border-radius: 2px;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/vallibabu18-sys/truemessanger-/main/Gemini_Generated_Image_8wjqp48wjqp48wjq%281%29.jpg" 
             class="final-logo" 
             alt="True Messenger Logo">
        
        <div class="red-line-fixed"></div>
    </div>

</body>
</html>
