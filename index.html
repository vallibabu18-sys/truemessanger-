<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ట్రూ మెసెంజర్</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* ఎడమ వైపు గోల్డెన్ పక్షి */
        .golden-bird {
            font-size: 70px;
            color: #856404; /* డార్క్ గోల్డ్ */
            background: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.2));
        }

        /* అక్షరాలు మరియు లైన్ బాక్స్ */
        .text-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* థిక్ డార్క్ గోల్డ్ అక్షరాలు */
        .gold-text {
            font-size: 58px;
            font-weight: 900;
            margin: 0;
            padding: 0;
            line-height: 1.0; /* అక్షరాలకు లైన్ ఆనుకొని రావడానికి */
            background: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* థిక్ రెడ్ ట్రాన్స్‌పరెంట్ అండర్ లైన్ - అక్షరాలకు ఆనుకొని */
        .thick-red-line {
            height: 8px;
            width: 100%;
            margin-top: 1px; /* కచ్చితమైన గ్యాప్ */
            background-color: rgba(200, 0, 0, 0.6); /* థిక్ ట్రాన్స్‌పరెంట్ రెడ్ */
            border-radius: 1px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="golden-bird">🕊️</div>

        <div class="text-group">
            <div class="gold-text">ట్రూ మెసెంజర్</div>
            <div class="thick-red-line"></div>
        </div>
    </div>

</body>
</html>
